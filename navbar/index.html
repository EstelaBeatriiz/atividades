 <html lang="pt-BR">

<head>

<body>

  <header>
    <nav>

        <a href="#" class="btn btn-primary">Entrar</a>
        <a href="#" class="btn btn-ghost">Criar conta</a>
      </div>

  </header>

    <main class="demo-content">
    <h1>Dê vida a suas<br>ideias <span>favoritas</span></h1>
